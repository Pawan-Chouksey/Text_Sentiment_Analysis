<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#060816"><title>Scan Result</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/TSA.css') }}?v=5">
</head>
<body>
  <main>
    <header><a href="/"><i></i>Galaxy Sentiment</a><span>Scan complete</span></header>
    <section class="panel result {{ result.split(' ')[0]|lower }}">
      <div class="pulse"></div>
      <p class="tag">Signal decoded</p>
      <h1>{{ result }}</h1>
      {% if input_text %}<blockquote><small>Original transmission</small>{{ input_text }}</blockquote>{% endif %}
      <a class="submit" href="/">Analyze another <b>&rarr;</b></a>
    </section>
    <footer>Analysis complete &middot; Signal archived locally</footer>
  </main>
</body>
</html>
